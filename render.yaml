services:
  - type: web
    name: resume-analyzer-backend
    env: docker
    plan: starter
    dockerfilePath: backend/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: APP_NAME
        value: AI Resume Analyzer
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: resume-analyzer-db
          property: connectionString
      - key: JWT_SECRET_KEY
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-1.5-flash
      - key: CORS_ORIGINS
        fromService:
          type: web
          name: resume-analyzer-frontend
          property: url
      - key: CHROMA_PERSIST_DIRECTORY
        value: /var/data/chroma
      - key: UPLOAD_DIR
        value: /var/data/uploads
      - key: MAX_UPLOAD_SIZE_MB
        value: "10"

  - type: web
    name: resume-analyzer-frontend
    env: docker
    plan: starter
    dockerfilePath: frontend/Dockerfile
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: resume-analyzer-backend
          property: url

databases:
  - name: resume-analyzer-db
    plan: starter